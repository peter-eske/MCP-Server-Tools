# ── Vollstack-Produktion: PostgreSQL + LiteLLM + Debate-Server ─────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: debate-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: litellm
    volumes:
      - debate_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm-gateway:
    image: docker.litellm.ai/berriai/litellm:main-latest
    container_name: debate-litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    command: ["--port", "4000", "--config", "/app/config.yaml"]
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  debate-server:
    build: .
    container_name: debate-server
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - LITELLM_API_BASE=http://litellm-gateway:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - PORT=8000
    env_file:
      - .env
    depends_on:
      - litellm-gateway
    volumes:
      - debate_logs:/app/logs

volumes:
  debate_postgres:
  debate_logs:
