# ── MCP-Server-Registrierung (debate-server als SSE-MCP) ──────────────────
mcp_servers:
  dynamische_ki_expertengruppe:
    url: "http://debate-server:8000/sse"
    transport: "sse"
    description: "Dynamische-KI-Expertengruppe – KI-Debattenserver"

litellm_settings:
  mcp_aliases:
    "debate": "dynamische_ki_expertengruppe"
  drop_params: true
  telemetry: false
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  store_model_in_db: true
  supported_db_objects: ["mcp"]
