# ── LiteLLM-Test-Konfiguration (NVIDIA NIM + MCP-Server) ───────────────────

model_list:
  # ── Allrounder (Default) ───────────────────────────────────────────────
  - model_name: default
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 120

  # ── Code-Spezialist ────────────────────────────────────────────────────
  - model_name: coding
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.1
      num_retries: 0
      request_timeout: 120

  # ── Low-Latency ────────────────────────────────────────────────────────
  - model_name: fast
    litellm_params:
      model: openai/microsoft/phi-4-mini-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 2048
      temperature: 0.5
      num_retries: 0
      request_timeout: 60

  # ── Maximale Qualität ──────────────────────────────────────────────────
  - model_name: power
    litellm_params:
      model: openai/qwen/qwen3-coder-480b-a35b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 300

  # ── NVIDIA-Modelle ohne openai/ Prefix (für Server-Nutzung) ────────────
  - model_name: deepseek-ai/deepseek-v4-flash
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 120

  - model_name: qwen-3-coder-480b
    litellm_params:
      model: openai/qwen/qwen3-coder-480b-a35b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 300

  - model_name: phi-4-mini
    litellm_params:
      model: openai/microsoft/phi-4-mini-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 2048
      temperature: 0.5
      num_retries: 0
      request_timeout: 60

  - model_name: llama-3.3-70b
    litellm_params:
      model: openai/meta/llama-3.3-70b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 4096
      temperature: 0.2
      num_retries: 0
      request_timeout: 180

# ── MCP-Server-Registrierung (debate-server als SSE-MCP) ──────────────────
mcp_servers:
  dynamische_ki_expertengruppe:
    url: "http://debate-test-server:8000/sse"
    transport: "sse"
    description: "Dynamische-KI-Expertengruppe – KI-Debattenserver (Test)"

litellm_settings:
  mcp_aliases:
    "debate": "dynamische_ki_expertengruppe"
  drop_params: true
  telemetry: false
  set_verbose: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  public_endpoints: ["/health", "/health/liveliness"]
  store_model_in_db: true
  supported_db_objects: ["mcp"]
