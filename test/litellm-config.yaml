# /www/wwwroot/gateway.ftbot.de/litellm-config.yaml

model_list:
  # ── Legacy-Kompatibilität (Chat/General) ────────────────────────────────
  # Rang 3 insgesamt, bewährt: swe_ver=72.0, mmlu=89.2, he=88.4, Verified=40.6
  - model_name: nim-llama
    litellm_params:
      model: openai/meta/llama-3.3-70b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 4096
      temperature: 0.2
      top_p: 0.7
      stream: true
      num_retries: 0
      request_timeout: 180

  # ── Allrounder (Default) ───────────────────────────────────────────────
  # Bester Allrounder mit Tool-Support: swe_ver=79%, lcb=91.6%, TTFT=0.96s
  - model_name: default
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 120

  # ── Low-Latency (3.8B, 88.6% GSM8K) ──────────────────────────────────
  - model_name: fast
    litellm_params:
      model: openai/microsoft/phi-4-mini-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 2048
      temperature: 0.5
      num_retries: 0
      request_timeout: 60

  # ── Maximale Qualität (38.70% SWE-bench Pro, 55.4% bash-only) ────────
  - model_name: power
    litellm_params:
      model: openai/qwen/qwen3-coder-480b-a35b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.2
      num_retries: 0
      request_timeout: 300

  # ── Code-Spezialist (v4-flash, Tool-Support, niedrige Temperatur) ─────
  - model_name: coding
    litellm_params:
      model: openai/deepseek-ai/deepseek-v4-flash
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NVIDIA_API_KEY
      max_tokens: 8192
      temperature: 0.1
      num_retries: 0
      request_timeout: 120

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  public_endpoints: ["/health", "/health/liveliness"]
  drop_params: true
  set_verbose: false
  ui_access_mode: "admin_only"

router_settings:
  num_retries: 0
  retry_after: 0
  routing_strategy: "simple-shuffle"

litellm_settings:
  success_callback: []
  failure_callback: []
  telemetry: false
